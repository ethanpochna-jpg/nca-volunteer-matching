# §13 handoff reskin — pinned warm cream/ink editorial theme (HANDOFF §2a).
# Pinned (base = "light" + explicit palette) so every viewer of the public
# demo sees the same designed look regardless of OS dark-mode preference.
# Fonts load from Google Fonts via Streamlit 1.60's native "<name>:<url>"
# mechanism; offline the app silently falls back to the default sans.
# Sidebar theming retired: s13-6 removes the sidebar entirely (ink footer).

[theme]
base = "light"
primaryColor = "#141413"              # ink — primary pill buttons
backgroundColor = "#F3F0EE"           # canvas cream (NOT white)
secondaryBackgroundColor = "#FCFBFA"  # lifted cream — bordered containers
textColor = "#141413"
linkColor = "#3860BE"
borderColor = "#E4DFD9"               # warm hairline
dataframeBorderColor = "#E4DFD9"
showWidgetBorder = true
baseRadius = "16px"
buttonRadius = "20px"
font = "Sofia Sans:https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@300..800&display=swap"
headingFont = "Sofia Sans:https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@400..700&display=swap"
headingFontSizes = ["2.6rem", "1.6rem", "1.3rem", "1rem", "0.9rem", "0.8rem"]
headingFontWeights = [500, 500, 600, 600, 700, 700]
codeBackgroundColor = "#F3F0EE"
# score-chip / badge palette, in-system (interim: markdown badges inherit
# these until s13-4 replaces them with vm-chip HTML spans):
greenBackgroundColor = "#FCFBFA"      # (T2B "good" — rendered as ink-dot chip; see HANDOFF §2c)
grayBackgroundColor  = "#F1EFEC"
grayTextColor        = "#8a8279"
orangeBackgroundColor = "#FBE9DF"     # B2B "flag"
orangeTextColor       = "#CF4500"
violetBackgroundColor = "#F2E9E2"     # dissent → retinted to clay family
violetTextColor       = "#9A3A0A"

[client]
toolbarMode = "viewer"
